<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DocXAI — Intelligent Document Generator</title>
    <link rel="stylesheet" href="css/app.css" />
    <!-- Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <!-- ── Header ──────────────────────────────────────────────────────── -->
    <header class="header">
        <div class="header-brand">
            <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
                <polyline points="10 9 9 9 8 9"/>
            </svg>
            <h1>DocX<span class="brand-accent">AI</span></h1>
        </div>
        <p class="header-subtitle">Upload a design document &rarr; AI generates a functional specification</p>
    </header>

    <!-- ── Main Content ────────────────────────────────────────────────── -->
    <main class="main">
        <!-- Upload Panel -->
        <section id="upload-section" class="card upload-card">
            <div id="drop-zone" class="drop-zone">
                <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <p class="drop-text"><strong>Drag &amp; drop</strong> your design document here</p>
                <p class="drop-subtext">or click to browse &bull; .txt, .md, .docx, .pdf up to 50 MB</p>
                <input type="file" id="file-input" class="file-input"
                       accept=".txt,.md,.docx,.pdf,.doc" />
            </div>

            <!-- Selected file info -->
            <div id="file-info" class="file-info hidden">
                <div class="file-details">
                    <svg class="file-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
                        <polyline points="13 2 13 9 20 9"/>
                    </svg>
                    <div>
                        <p id="file-name" class="file-name"></p>
                        <p id="file-size" class="file-size"></p>
                    </div>
                </div>
                <button id="remove-file" class="btn-icon" title="Remove file">&times;</button>
            </div>

            <button id="upload-btn" class="btn btn-primary" disabled>
                <span class="btn-label">Generate Functional Document</span>
                <svg class="btn-spinner hidden" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" stroke="currentColor"
                            stroke-width="3" fill="none" stroke-dasharray="31.4 31.4"
                            stroke-linecap="round"/>
                </svg>
            </button>

            <!-- Progress -->
            <div id="progress-section" class="progress-section hidden">
                <div class="progress-bar-track">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
                <p id="progress-text" class="progress-text">Uploading…</p>
            </div>

            <!-- Error -->
            <div id="error-section" class="error-section hidden">
                <p id="error-text"></p>
            </div>
        </section>

        <!-- Result Panel -->
        <section id="result-section" class="card result-card hidden">
            <div class="result-header">
                <h2>Generated Functional Specification</h2>
                <div class="result-actions">
                    <button id="copy-btn" class="btn btn-outline btn-sm" title="Copy to clipboard">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                        </svg>
                        Copy
                    </button>
                    <button id="new-upload-btn" class="btn btn-outline btn-sm">New Upload</button>
                </div>
            </div>
            <div class="result-meta" id="result-meta"></div>
            <div id="document-viewer" class="document-viewer"></div>
        </section>
    </main>

    <!-- ── Footer ──────────────────────────────────────────────────────── -->
    <footer class="footer">
        <p>DocXAI &mdash; Powered by Vertex AI (Gemini) &bull; Google Cloud Storage &bull; ASP.NET 10</p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
